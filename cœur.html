<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Amour ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
}

.heart{
    position:relative;
    width:200px;
    height:200px;
    transform:rotate(-45deg);
    background:red;
    animation:beat 1.2s infinite;
}

.heart::before,
.heart::after{
    content:"";
    position:absolute;
    width:200px;
    height:200px;
    background:red;
    border-radius:50%;
}

.heart::before{
    top:-100px;
    left:0;
}

.heart::after{
    left:100px;
    top:0;
}

.text{
    position:absolute;
    color:white;
    font-size:28px;
    text-align:center;
    z-index:10;
    font-weight:bold;
}

@keyframes beat{
    0%,100%{
        transform:rotate(-45deg) scale(1);
    }
    50%{
        transform:rotate(-45deg) scale(1.15);
    }
}
</style>
</head>

<body>

<div class="text">
    ❤️ Tu me manques ❤️
</div>

<div class="heart"></div>

</body>
</html>
